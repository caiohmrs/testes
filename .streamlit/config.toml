[theme]
# Força a base para o modo claro
base="light"

# Cores da Identidade Visual Max Maciel (Backup do CSS)
primaryColor="#E20613"
backgroundColor="#FFFFFF"
secondaryBackgroundColor="#FFEB00"
textColor="#1D1D1B"
font="sans serif"

[client]
# Esta é a opção correta para versões recentes se quiser esconder a navegação padrão de páginas
showSidebarNavigation = false
# Define o modo da barra de ferramentas (minimal remove o menu desnecessário)
toolbarMode = "minimal"
